	<script>
		const privacy = document.getElementById('privacy');

		if (localStorage.getItem('hidePrivacyPopup')) { privacy.style.cssText = 'display: none;' }
		function closeprivacy() {
			localStorage.setItem('hidePrivacyPopup', 'true');

			privacy.style.cssText = 'transform: translateX(200%); opacity: 0;';
			setTimeout(() => privacy.style.cssText = 'display: none;', 1000);
		}

		const audio = document.getElementById('audio');
		const slider = document.getElementById('slider');

		const bookmarks = [ {name: "Intro", time: 0}, {name: "1a", time: 42}, {name: "1b", time: 92}, {name: "1c", time: 135}, {name: "1d", time: 192}, {name: "1e", time: 264}, {name: "1f", time: 300}, {name: "2", time: 351}, {name: "3", time: 686}, {name: "4a", time: 1035}, {name: "4b", time: 1078}, {name: "4c", time: 1114}, {name: "4d", time: 1178}, {name: "4e", time: 1235}, {name: "4f", time: 1324}, {name: "4g", time: 1374}, {name: "5", time: 1416}, {name: "6", time: 1664}, {name: "7a", time: 1917}, {name: "7b", time: 2003}, {name: "8", time: 2088}, {name: "", time: audio.duration} ];

		function getquestion() {
			let closest = 0;
			for (let i = 1; i < bookmarks.length; i++) {
				if (audio.currentTime >= bookmarks[i].time) {
					closest = i;
				} else {
					return closest;
				}
			}
			return closest;
		}

		function fixquestion() {
			let question = getquestion();
			document.getElementById('curq').innerText = `Current Question: ${bookmarks[question].name}`;
			document.getElementById('prevq').innerText = question == 0 ? '' : `${bookmarks[question - 1].name}`;
			document.getElementById('nextq').innerText = `${bookmarks[question + 1].name}`;
		}

		function gotoq(step) {
			let question = getquestion() + step;
			audio.currentTime = bookmarks[question].time;
			seek((audio.currentTime / audio.duration) * 100, true);
			fixTimestamp();
			fixquestion();
		}

		function round(num, places) {
			const factor = Math.pow(10, places);
			return Math.round(num * factor) / factor;
		}

		function playpause() {
			if (audio.paused) {
				audio.play();
				document.getElementById('play-svg').style.display = 'none';
				document.getElementById('pause-svg').style.display = 'block';
			} else {
				audio.pause();
				document.getElementById('play-svg').style.display = 'block';
				document.getElementById('pause-svg').style.display = 'none';
			}
		}

		function fixTimestamp () {
			let curm = Math.floor(audio.currentTime / 60);
			let curs = Math.floor(audio.currentTime - (curm * 60));
			let totm = Math.floor(audio.duration / 60);
			let tots = Math.floor(audio.duration - (totm * 60));
			document.getElementById('timestamp').innerText = `${curm < 10 ? '0' : ''}${curm}:${curs < 10 ? '0' : ''}${curs}/${totm < 10 ? '0' : ''}${totm}:${tots < 10 ? '0' : ''}${tots}`;
		}

		function seek(value, noAudio=false) {
			slider.style.setProperty('--fill', `${value}%`);
			slider.value = value;

			if (!noAudio && audio) {
				console.log(slider.value, audio.duration, audio.currentTime);
				audio.currentTime = (slider.value / 100) * audio.duration;
				fixTimestamp();
				fixquestion();
			}
		}

		function skip(value) {
			if (audio) {
				audio.currentTime += value;
				seek((audio.currentTime / audio.duration) * 100, true);
				fixTimestamp();
				fixquestion();
			}
		}

		setTimeout(() => seek(0), 500);
		audio.addEventListener('loadedmetadata', () => seek(0));

		audio.addEventListener('timeupdate', () => {
			seek((audio.currentTime / audio.duration) * 100, true);
			fixTimestamp();
			fixquestion();

			if (audio.paused) {
				document.getElementById('play-svg').style.display = 'block';
				document.getElementById('pause-svg').style.display = 'none';
			} else {
				document.getElementById('play-svg').style.display = 'none';
				document.getElementById('pause-svg').style.display = 'block';
			}
		});

		// var time = new Date("28 Apr, 2025 00:00:00").getTime() - new Date().getTime();
		// var days = Math.ceil(time / (1000 * 60 * 60 * 24));
		// if (time >= 0) {
		// 	if (days == 1) {
		// 		document.getElementById("name").innerHTML = `N5 Music 2015 Audio - ${days} day`;
		// 	} else {
		// 		document.getElementById("name").innerHTML = `N5 Music 2015 Audio - ${days} days`;
		// 	}
		// } else if (days == 0) {
		// 	document.getElementById("name").innerHTML = `N5 Music 2015 Audio - Today`;
		// }

		const finder = document.getElementById('finder');
		const icon = document.getElementById('icon');
		const query = document.getElementById('query');
		const levels = document.getElementById('search');

		const resultList = document.getElementById('results');

		function toggleSearch() {
			setTimeout(() => {
				resultList.innerHTML = '';
				resultList.style.cssText = 'visibility: hidden;';
				
				if (finder.style.visibility === 'hidden') {
					finder.style.cssText = '';
					icon.style.cssText = 'border-radius: 0 var(--corner) var(--corner) 0;';
					levels.style.opacity = 0;
					query.style.cssText = '';
					query.value = '';
					setTimeout(() => query.focus(), 100);
				} else {
					finder.style.cssText = 'visibility: hidden; --width: 0; border-radius: var(--corner)';
					icon.style.cssText = '';
					levels.style.opacity = 1;
					query.style.cssText = 'opacity: 0;';
				}
			}, 50);
		}
		document.addEventListener('click', event => {
			if (finder.style.visibility !== 'hidden' && event.target !== query) {
				toggleSearch();
			}
		});

		fetch('https://qwk.pythonanywhere.com/l/sqa-n5-music-2015-audio', { method: 'GET' })
			.then(response => response.json())
			.then(data => {
				document.getElementById('visits').innerText = `This page has been visited ${data['visits']} times`;
			})
			.catch(error => {
				document.getElementById('visits').innerText = `Couldn't load visits`;
				console.error('Error fetching visits:', error)
			});
	</script>
	<script src="https://cdn.jsdelivr.net/gh/qwkdev/sqa/fuse.js"></script>
	<script>
		const subjects = [ { "short": "apps", "mid": "Apps", "long": "Applications of Maths", "level": "n5" }, { "short": "art", "mid": "Art", "long": "Art", "level": "n5" }, { "short": "bio", "mid": "Biology", "long": "Biology", "level": "n5" }, { "short": "business", "mid": "Business", "long": "Business", "level": "n5" }, { "short": "canto", "mid": "Canto", "long": "Cantonese", "level": "n5" }, { "short": "chem", "mid": "Chemistry", "long": "Chemistry", "level": "n5" }, { "short": "computing", "mid": "Computing", "long": "Computing Science", "level": "n5" }, { "short": "dance", "mid": "Dance", "long": "Dance", "level": "n5" }, { "short": "dm", "mid": "D&M", "long": "Design and Manufacture", "level": "n5" }, { "short": "drama", "mid": "Drama", "long": "Drama", "level": "n5" }, { "short": "engineering", "mid": "Engineering", "long": "Engineering Science", "level": "n5" }, { "short": "english", "mid": "English", "long": "English", "level": "n5" }, { "short": "esol", "mid": "ESOL", "long": "ESOL", "level": "n5" }, { "short": "french", "mid": "French", "long": "French", "level": "n5" }, { "short": "geo", "mid": "Geography", "long": "Geography", "level": "n5" }, { "short": "graphics", "mid": "Graphics", "long": "Graphic Communication", "level": "n5" }, { "short": "history", "mid": "History", "long": "History", "level": "n5" }, { "short": "maths", "mid": "Maths", "long": "Mathematics", "level": "n5" }, { "short": "mody", "mid": "Mody", "long": "Modern Studies", "level": "n5" }, { "short": "music", "mid": "Music", "long": "Music", "level": "n5" }, { "short": "musictech", "mid": "Music Tech", "long": "Music Technology", "level": "n5" }, { "short": "philosophy", "mid": "Philosophy", "long": "Philosophy", "level": "n5" }, { "short": "physics", "mid": "Physics", "long": "Physics", "level": "n5" }, { "short": "rmps", "mid": "RMPS", "long": "RMPS", "level": "n5" }, { "short": "spanish", "mid": "Spanish", "long": "Spanish", "level": "n5" }, { "short": "accounting", "mid": "Accounting", "long": "Accounting", "level": "h" }, { "short": "apps", "mid": "Apps", "long": "Applications of Maths", "level": "h" }, { "short": "art", "mid": "Art", "long": "Art", "level": "h" }, { "short": "bio", "mid": "Biology", "long": "Biology", "level": "h" }, { "short": "business", "mid": "Business", "long": "Business", "level": "h" }, { "short": "canto", "mid": "Canto", "long": "Cantonese", "level": "h" }, { "short": "chem", "mid": "Chemistry", "long": "Chemistry", "level": "h" }, { "short": "computing", "mid": "Computing", "long": "Computing Science", "level": "h" }, { "short": "dance", "mid": "Dance", "long": "Dance", "level": "h" }, { "short": "dm", "mid": "D&M", "long": "Design and Manufacture", "level": "h" }, { "short": "drama", "mid": "Drama", "long": "Drama", "level": "h" }, { "short": "engineering", "mid": "Engineering", "long": "Engineering Science", "level": "h" }, { "short": "english", "mid": "English", "long": "English", "level": "h" }, { "short": "esol", "mid": "ESOL", "long": "ESOL", "level": "h" }, { "short": "french", "mid": "French", "long": "French", "level": "h" }, { "short": "geo", "mid": "Geography", "long": "Geography", "level": "h" }, { "short": "graphics", "mid": "Graphics", "long": "Graphic Communication", "level": "h" }, { "short": "history", "mid": "History", "long": "History", "level": "h" }, { "short": "humanbio", "mid": "Human Bio", "long": "Human Biology", "level": "h" }, { "short": "maths", "mid": "Maths", "long": "Mathematics", "level": "h" }, { "short": "mody", "mid": "Mody", "long": "Modern Studies", "level": "h" }, { "short": "music", "mid": "Music", "long": "Music", "level": "h" }, { "short": "musictech", "mid": "Music Tech", "long": "Music Technology", "level": "h" }, { "short": "pe", "mid": "PE", "long": "PE", "level": "h" }, { "short": "philosophy", "mid": "Philosophy", "long": "Philosophy", "level": "h" }, { "short": "photography", "mid": "Photography", "long": "Photography", "level": "h" }, { "short": "physics", "mid": "Physics", "long": "Physics", "level": "h" }, { "short": "politics", "mid": "Politics", "long": "Politics", "level": "h" }, { "short": "rmps", "mid": "RMPS", "long": "RMPS", "level": "h" }, { "short": "spanish", "mid": "Spanish", "long": "Spanish", "level": "h" } ];

		const fuse = new Fuse(subjects, {
			keys: [
				{ name: "short", weight: 0.3 },
				{ name:   "mid", weight: 0.5 },
				{ name:  "long", weight: 0.2 }
			],
			includeScore: true,
			includeMatches: true,
			threshold: 0.4
		})

		function normal(score) {
			return 1 - Math.min(Math.max(score, 0), 1);
		}

		const levelsd = {"n5": "nat5", "h": "higher", "ah": "ah"};
		query.addEventListener('input', event => {
			const results = fuse.search(event.target.value);
			
			resultList.innerHTML = '';
			if (results.length > 0) {
				finder.style.cssText = 'border-radius: var(--corner) 0 0 0;';
				resultList.style.cssText = '';

				let total = results.reduce((sum, item) => sum + normal(item.score), 0);
				results.forEach(ele => {
					let subject = document.createElement('a');
					subject.href = `https://${levelsd[ele.item.level]}.sqa.my/${ele.item.short}`;
					
					let resultName = ele.item.mid;
					let offset = 0;

					ele.matches?.find(obj => obj.key === "mid")?.indices[0].forEach((i, index) => {
						if (index % 2 === 0) {
							resultName = resultName.slice(0, i+offset) + `<b>${resultName.slice(i+offset)}`;
							offset += 3;
						} else {
							resultName = resultName.slice(0, i+offset+1) + `</b>${resultName.slice(i+offset+1)}`;
							offset += 4;
						}
					})

					subject.innerHTML = `${ele.item.level.toUpperCase()} ${resultName}<span>${Math.round((normal(ele.score) / total) * 100)}%</span>`;
					resultList.appendChild(subject);
				})
			} else {
				finder.style.cssText = '';
				resultList.style.cssText = 'visibility: hidden;';
			}
		});
	</script>
